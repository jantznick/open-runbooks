stages:
  - sca

sca_trivy_scan:
  stage: sca
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    SCA_SCAN_PATH: "$SCA_SCAN_PATH"
    SEC_OUTPUT_DIR: "./artifacts/security"
    SCA_REPORT_PREFIX: "trivy-sca"
    SCA_FAIL_ON_FAILS: "true"
    SCA_FAIL_ON_WARNINGS: "false"
  before_script:
    - chmod +x ./runbooks/appsec/sca-trivy-basic.sh
  script:
    - ./runbooks/appsec/sca-trivy-basic.sh
  artifacts:
    when: always
    paths:
      - artifacts/security/trivy-sca.json
    expire_in: 1 week

stages:
  - sast

sast_scan:
  stage: sast
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    SAST_SCAN_PATH: "$SAST_SCAN_PATH"
    SAST_RULESET: "$SAST_RULESET"
    SEC_OUTPUT_DIR: "./artifacts/security"
    SAST_FAIL_ON_FINDINGS: "true"
  before_script:
    - chmod +x ./runbooks/appsec/sast-semgrep-opengrep-basic.sh
  script:
    - ./runbooks/appsec/sast-semgrep-opengrep-basic.sh
  artifacts:
    when: always
    paths:
      - artifacts/security/sast-results.json
    expire_in: 1 week

stages:
  - sca

sca_snyk_scan:
  stage: sca
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    SNYK_TOKEN: "$SNYK_TOKEN"
    SCA_SCAN_PATH: "$SCA_SCAN_PATH"
    SEC_OUTPUT_DIR: "./artifacts/security"
    SCA_REPORT_PREFIX: "sca-snyk"
    SCA_FAIL_ON_FAILS: "true"
    SCA_SNYK_SEVERITY_THRESHOLD: "${SCA_SNYK_SEVERITY_THRESHOLD:-high}"
    SCA_SNYK_ALL_PROJECTS: "${SCA_SNYK_ALL_PROJECTS:-false}"
  before_script:
    - chmod +x ./runbooks/appsec/sca-snyk-basic.sh
  script:
    - ./runbooks/appsec/sca-snyk-basic.sh
  artifacts:
    when: always
    paths:
      - artifacts/security/sca-snyk.json
    expire_in: 1 week

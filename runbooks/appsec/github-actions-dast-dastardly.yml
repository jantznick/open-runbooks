name: dast-dastardly

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dastardly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/dast-dastardly-basic.sh

      - name: Run Dastardly DAST runbook
        env:
          DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL }}
          SEC_OUTPUT_DIR: ./artifacts/security
          DAST_REPORT_PREFIX: dastardly-report
          DAST_FAIL_ON_FAILS: "true"
          DAST_FAIL_ON_WARNINGS: "false"
        run: ./runbooks/appsec/dast-dastardly-basic.sh

      - name: Upload Dastardly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dastardly-results
          path: artifacts/security/dastardly-report.xml

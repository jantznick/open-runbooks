stages:
  - secrets

secrets_trufflehog_scan:
  stage: secrets
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    SECRETS_SCAN_PATH: "$SECRETS_SCAN_PATH"
    SEC_OUTPUT_DIR: "./artifacts/security"
    SECRETS_REPORT_PREFIX: "trufflehog-results"
    SECRETS_FAIL_ON_FINDINGS: "true"
  before_script:
    - chmod +x ./runbooks/appsec/secrets-trufflehog-basic.sh
  script:
    - ./runbooks/appsec/secrets-trufflehog-basic.sh
  artifacts:
    when: always
    paths:
      - artifacts/security/trufflehog-results.jsonl
    expire_in: 1 week

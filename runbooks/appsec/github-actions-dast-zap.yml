name: dast-zap

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/dast-zap-basic.sh

      - name: Run ZAP DAST runbook
        env:
          DAST_TARGET_URL: ${{ vars.DAST_TARGET_URL }}
          SEC_OUTPUT_DIR: ./artifacts/security
          DAST_SCAN_MODE: ${{ vars.DAST_SCAN_MODE || 'baseline' }}
          DAST_SCAN_MINUTES: ${{ vars.DAST_SCAN_MINUTES || '1' }}
          DAST_FAIL_ON_FAILS: "true"
          DAST_FAIL_ON_WARNINGS: "false"
        run: ./runbooks/appsec/dast-zap-basic.sh

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-results
          path: artifacts/security/zap-baseline.*

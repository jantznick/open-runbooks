stages:
  - sast

sast_snyk_code_scan:
  stage: sast
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    SNYK_TOKEN: "$SNYK_TOKEN"
    SAST_SCAN_PATH: "$SAST_SCAN_PATH"
    SEC_OUTPUT_DIR: "./artifacts/security"
    SAST_FAIL_ON_FINDINGS: "true"
    SAST_SNYK_SEVERITY_THRESHOLD: "${SAST_SNYK_SEVERITY_THRESHOLD:-high}"
  before_script:
    - chmod +x ./runbooks/appsec/sast-snyk-code-basic.sh
  script:
    - ./runbooks/appsec/sast-snyk-code-basic.sh
  artifacts:
    when: always
    paths:
      - artifacts/security/sast-snyk-code.json
    expire_in: 1 week

name: secrets-trufflehog

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/secrets-trufflehog-basic.sh

      - name: Run TruffleHog secrets runbook
        env:
          SECRETS_SCAN_PATH: ${{ vars.SECRETS_SCAN_PATH || '.' }}
          SEC_OUTPUT_DIR: ./artifacts/security
          SECRETS_REPORT_PREFIX: trufflehog-results
          SECRETS_FAIL_ON_FINDINGS: "true"
        run: ./runbooks/appsec/secrets-trufflehog-basic.sh

      - name: Upload TruffleHog artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: artifacts/security/trufflehog-results.jsonl

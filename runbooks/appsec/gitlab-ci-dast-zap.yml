stages:
  - dast

dast_zap_scan:
  stage: dast
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DAST_TARGET_URL: "${DAST_TARGET_URL}"
    SEC_OUTPUT_DIR: "./artifacts/security"
    DAST_SCAN_MODE: "${DAST_SCAN_MODE}"
    DAST_SCAN_MINUTES: "${DAST_SCAN_MINUTES}"
    DAST_FAIL_ON_FAILS: "true"
    DAST_FAIL_ON_WARNINGS: "false"
  before_script:
    - chmod +x ./runbooks/appsec/dast-zap-basic.sh
  script:
    - ./runbooks/appsec/dast-zap-basic.sh
  artifacts:
    when: always
    paths:
      - artifacts/security/zap-baseline.json
      - artifacts/security/zap-baseline.md
      - artifacts/security/zap-baseline.html
    expire_in: 1 week

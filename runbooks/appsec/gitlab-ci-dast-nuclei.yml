stages:
  - dast

dast_nuclei_scan:
  stage: dast
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DAST_TARGET_URL: "${DAST_TARGET_URL}"
    SEC_OUTPUT_DIR: "./artifacts/security"
    DAST_REPORT_PREFIX: "nuclei-report"
    DAST_FAIL_ON_FAILS: "true"
    DAST_FAIL_ON_WARNINGS: "false"
  before_script:
    - chmod +x ./runbooks/appsec/dast-nuclei-basic.sh
  script:
    - ./runbooks/appsec/dast-nuclei-basic.sh
  artifacts:
    when: always
    paths:
      - artifacts/security/nuclei-report.jsonl
    expire_in: 1 week

# Security demo gate: Semgrep SAST + Trivy SCA + TruffleHog secrets (+ optional Snyk).
# Intended for demos and forks: defaults scans to test-app-vulnerable-todo when repo vars are unset.
#
# Setup:
#   - Fork/push this repo layout; enable Actions.
#   - Optional: add repository secret SNYK_TOKEN for Snyk Code + Snyk Open Source jobs.
#   - Optional: set repository variables SAST_SCAN_PATH, SCA_SCAN_PATH, SECRETS_SCAN_PATH (use "." if app is at repo root).
#
# Walkthrough: runbooks/appsec/demo-github-security-ci-walkthrough.md

name: security-demo-gate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-demo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/sast-semgrep-opengrep-basic.sh

      - name: Run Semgrep SAST runbook
        env:
          SAST_SCAN_PATH: ${{ vars.SAST_SCAN_PATH || 'test-app-vulnerable-todo' }}
          SAST_RULESET: ${{ vars.SAST_RULESET || 'p/security-audit' }}
          SEC_OUTPUT_DIR: ./artifacts/security
          SAST_FAIL_ON_FINDINGS: "true"
        run: ./runbooks/appsec/sast-semgrep-opengrep-basic.sh

      - name: Upload SAST artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-sast-semgrep
          path: artifacts/security/sast-results.json

  sca-trivy:
    name: SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/sca-trivy-basic.sh

      - name: Run Trivy SCA runbook
        env:
          SCA_SCAN_PATH: ${{ vars.SCA_SCAN_PATH || 'test-app-vulnerable-todo' }}
          SEC_OUTPUT_DIR: ./artifacts/security
          SCA_REPORT_PREFIX: trivy-sca
          SCA_FAIL_ON_FAILS: "true"
          SCA_FAIL_ON_WARNINGS: "false"
        run: ./runbooks/appsec/sca-trivy-basic.sh

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-sca-trivy
          path: artifacts/security/trivy-sca.json

  secrets-trufflehog:
    name: Secrets (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/secrets-trufflehog-basic.sh

      - name: Run TruffleHog runbook
        env:
          SECRETS_SCAN_PATH: ${{ vars.SECRETS_SCAN_PATH || 'test-app-vulnerable-todo' }}
          SEC_OUTPUT_DIR: ./artifacts/security
          SECRETS_REPORT_PREFIX: trufflehog-results
          SECRETS_FAIL_ON_FINDINGS: "true"
        run: ./runbooks/appsec/secrets-trufflehog-basic.sh

      - name: Upload TruffleHog artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-secrets-trufflehog
          path: artifacts/security/trufflehog-results.jsonl

  sast-snyk-code:
    name: SAST (Snyk Code)
    if: ${{ secrets.SNYK_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/sast-snyk-code-basic.sh

      - name: Run Snyk Code runbook
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SAST_SCAN_PATH: ${{ vars.SAST_SCAN_PATH || 'test-app-vulnerable-todo' }}
          SEC_OUTPUT_DIR: ./artifacts/security
          SAST_FAIL_ON_FINDINGS: "true"
          SAST_SNYK_SEVERITY_THRESHOLD: ${{ vars.SAST_SNYK_SEVERITY_THRESHOLD || 'high' }}
        run: ./runbooks/appsec/sast-snyk-code-basic.sh

      - name: Ensure Snyk Code JSON exists for artifact upload
        if: always()
        run: |
          mkdir -p ./artifacts/security
          if [[ ! -s ./artifacts/security/sast-snyk-code.json ]]; then
            echo '{"note":"Snyk Code did not write a JSON file (often zero findings). Placeholder for CI artifact."}' > ./artifacts/security/sast-snyk-code.json
          fi

      - name: Upload Snyk Code artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-sast-snyk-code
          path: artifacts/security/sast-snyk-code.json

  sca-snyk:
    name: SCA (Snyk Open Source)
    if: ${{ secrets.SNYK_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runbook script executable
        run: chmod +x ./runbooks/appsec/sca-snyk-basic.sh

      - name: Run Snyk Open Source runbook
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SCA_SCAN_PATH: ${{ vars.SCA_SCAN_PATH || 'test-app-vulnerable-todo' }}
          SEC_OUTPUT_DIR: ./artifacts/security
          SCA_REPORT_PREFIX: sca-snyk
          SCA_FAIL_ON_FAILS: "true"
          SCA_SNYK_SEVERITY_THRESHOLD: ${{ vars.SCA_SNYK_SEVERITY_THRESHOLD || 'high' }}
          SCA_SNYK_ALL_PROJECTS: ${{ vars.SCA_SNYK_ALL_PROJECTS || 'false' }}
        run: ./runbooks/appsec/sca-snyk-basic.sh

      - name: Ensure Snyk SCA JSON exists for artifact upload
        if: always()
        run: |
          mkdir -p ./artifacts/security
          if [[ ! -s ./artifacts/security/sca-snyk.json ]]; then
            echo '{"note":"sca-snyk.json was missing or empty after snyk test; placeholder for CI artifact."}' > ./artifacts/security/sca-snyk.json
          fi

      - name: Upload Snyk SCA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-sca-snyk
          path: artifacts/security/sca-snyk.json
